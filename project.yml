name: NotesApp
options:
  bundleIdPrefix: is.danny
  # iOS 17 is the floor required by our stack: SwiftData (@Model), the
  # Observation framework (@Observable/@Bindable), and ContentUnavailableView.
  # Lower = installs on more devices; nothing we use needs anything newer.
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
# Non-source files surfaced in the Xcode navigator for convenience.
fileGroups:
  - project.yml
  - .swiftlint.yml
  - .swiftformat
  - README.md
targets:
  NotesApp:
    type: application
    platform: iOS
    sources:
      - path: NotesApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.danny.notesapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Notes
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        # Allow the SwiftLint build phase to read the source tree.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          # Xcode build phases run with a minimal PATH; add Homebrew's bin dirs
          # (Apple Silicon + Intel) so swiftlint is found.
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "warning: SwiftLint not installed — run 'brew install swiftlint'"
          fi
