# SwiftLint configuration — https://github.com/realm/SwiftLint
included:
  - NotesApp

opt_in_rules:
  - empty_count
  - first_where
  - contains_over_filter_count
  - toggle_bool
  - closure_spacing
  - redundant_nil_coalescing
  - explicit_init

disabled_rules:
  # SwiftUI view bodies are legitimately long; SwiftFormat owns layout.
  - function_body_length

# SwiftUI views (form + actions + networking) run longer than the default.
type_body_length:
  warning: 300
  error: 400

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id

large_tuple:
  warning: 3
  error: 4
